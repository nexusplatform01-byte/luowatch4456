<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>LUO WATCH — Luo Movies, Music Videos, Live TV & Acholi TikTok</title>
    <meta name="description" content="LUO WATCH is Uganda's top Luo media platform — watch and download Luo translated movies from top VJs, stream Luo music videos, watch live TV channels, and enjoy Acholi TikTok content. Free streaming and free music downloads." />
    <meta name="keywords" content="Luo Watch, Luo movies, Luo music, Uganda music, Acholi music, Luo translated movies, Luo VJ, Uganda music videos, Luo songs, free music download, Luo TikTok, Uganda live TV, Luo media" />
    <meta name="author" content="LUO WATCH" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://luowatch.replit.app/" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A84FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preload" href="/logo.png" as="image" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="LUO WATCH" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LUO WATCH — Luo Movies, Music Videos, Live TV & Acholi TikTok" />
    <meta property="og:description" content="Watch and download Luo translated movies, stream Luo music videos and live TV. Uganda's #1 Luo media streaming platform." />
    <meta property="og:image" content="https://luowatch.replit.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://luowatch.replit.app/" />
    <meta property="og:locale" content="en_UG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LUO WATCH — Luo Movies, Music Videos, Live TV & Acholi TikTok" />
    <meta name="twitter:description" content="Watch and download Luo translated movies, stream Luo music videos and live TV. Uganda's #1 Luo media platform." />
    <meta name="twitter:image" content="https://luowatch.replit.app/og-image.png" />

    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LUO WATCH",
      "url": "https://luowatch.replit.app",
      "logo": "https://luowatch.replit.app/logo.png",
      "description": "Uganda's leading Luo media streaming platform — movies, music, live TV and Acholi TikTok",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "Luo"]
      }
    }
    </script>

    <!-- WebSite Search Action for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LUO WATCH",
      "url": "https://luowatch.replit.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://luowatch.replit.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script src="https://checkout.flutterwave.com/v3.js" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
